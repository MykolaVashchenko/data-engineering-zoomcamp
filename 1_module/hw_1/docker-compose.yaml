services:
  pgdatabase:
    image: postgres:18
    environment:
      POSTGRES_USER: "root"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "green_ny_taxi_trips"
    volumes:
      - "ny_taxi_postgres_data:/var/lib/postgresql/"
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "root"
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
    ports:
      - "8080:80"

  data_ingestion:
    build: .
    depends_on:
      - pgdatabase
    command: >
      --pg-host=pgdatabase



volumes:
  ny_taxi_postgres_data:
  pgadmin_data: